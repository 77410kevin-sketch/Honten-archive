{% extends "base.html" %}
{% block title %}新增供應商{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:720px">
  <h4 class="mb-3"><i class="bi bi-plus-circle me-2 text-primary"></i>新增供應商</h4>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post" action="/suppliers/new">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">類型</label>
            <select name="type" class="form-select" required>
              <option value="外部">外部</option>
              <option value="廠內">廠內</option>
            </select>
          </div>
          <div class="col-md-8">
            <label class="form-label">供應商名稱 <span class="text-danger">*</span></label>
            <input name="name" class="form-control" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">聯絡人</label>
            <input name="contact" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label">電話</label>
            <input name="phone" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">Email <small class="text-muted">(詢價信寄送對象)</small></label>
            <input name="email" type="email" class="form-control">
          </div>
          <div class="col-12">
            <label class="form-label">備註</label>
            <textarea name="memo" rows="3" class="form-control"></textarea>
          </div>
        </div>
        <div class="mt-3 d-flex justify-content-end gap-2">
          <a href="/suppliers/" class="btn btn-outline-secondary">取消</a>
          <button class="btn btn-primary">儲存</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
