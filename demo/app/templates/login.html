<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鴻騰電子 PCN/ECN — 登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1a2980, #26d0ce); min-height: 100vh; }
    .login-card { border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="card login-card" style="width:380px">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-arrow-repeat text-primary fs-1"></i>
        <h4 class="mt-2 fw-bold">鴻騰電子</h4>
        <p class="text-muted small">PCN/ECN 變更管理系統 Demo</p>
      </div>

      {% if error %}
      <div class="alert alert-danger small py-2">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">帳號</label>
          <input type="text" name="username" class="form-control" placeholder="輸入帳號" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">密碼</label>
          <input type="password" name="password" class="form-control" placeholder="輸入密碼" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>登入
        </button>
      </form>

      <hr class="my-3">
      <div class="small text-muted">
        <div class="fw-semibold mb-1">測試帳號（密碼統一：ht1234）</div>
        <div class="row g-1">
          <div class="col-6"><code>eng01</code> 工程師</div>
          <div class="col-6"><code>qc01</code> 品保</div>
          <div class="col-6"><code>prodmgr01</code> 產線主管</div>
          <div class="col-6"><code>buhead</code> BU主管</div>
          <div class="col-6"><code>pc01</code> 採購</div>
          <div class="col-6"><code>admin</code> 管理員</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
