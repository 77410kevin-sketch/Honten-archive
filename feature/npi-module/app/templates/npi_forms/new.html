{% extends "base.html" %}
{% block title %}新建 NPI/RFQ{% endblock %}
{% block content %}
<div class="container py-4" style="max-width: 960px">
  <h4 class="mb-3"><i class="bi bi-plus-circle me-2 text-primary"></i>新建 NPI/RFQ 單（業務詢價）</h4>

  <form method="post" action="/npi-forms/new" enctype="multipart/form-data" id="npiForm">
    <div class="card shadow-sm mb-3">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-person-lines-fill me-2"></i>客戶資訊</div>
      <div class="card-body row g-3">
        <div class="col-md-6">
          <label class="form-label">客戶名稱 <span class="text-danger">*</span></label>
          <input name="customer_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">客戶聯絡人</label>
          <input name="customer_contact" class="form-control">
        </div>
        <div class="col-md-8">
          <label class="form-label">客戶 Email <small class="text-muted">(報價完成後寄送對象)</small></label>
          <input name="customer_email" type="email" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">客戶回覆期限</label>
          <input name="rfq_due_date" type="date" class="form-control">
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-box me-2"></i>產品資訊</div>
      <div class="card-body row g-3">
        <div class="col-md-6">
          <label class="form-label">產品名稱 <span class="text-danger">*</span></label>
          <input name="product_name" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">型號</label>
          <input name="product_model" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">目標單價</label>
          <input name="target_price" type="number" step="0.01" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">年需求量</label>
          <input name="annual_qty" type="number" class="form-control">
        </div>
        <div class="col-md-4">
          <label class="form-label">事業部</label>
          <select name="bu" class="form-select">
            <option value="">—</option>
            <option value="儲能事業部">儲能事業部</option>
            <option value="消費性事業部">消費性事業部</option>
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">規格摘要</label>
          <textarea name="spec_summary" rows="3" class="form-control"></textarea>
        </div>
        <div class="col-12">
          <label class="form-label">業務補充資訊</label>
          <textarea name="sales_note" rows="3" class="form-control"
                    placeholder="客戶背景、決策時程、特殊需求…"></textarea>
        </div>
      </div>
    </div>

    <div class="card shadow-sm mb-3">
      <div class="card-header bg-white fw-semibold"><i class="bi bi-paperclip me-2"></i>附件上傳</div>
      <div class="card-body">
        <p class="small text-muted mb-3">
          送審時須至少包含【客戶詢價信】與【規格書或圖面】其一。
        </p>
        <div id="attach-rows">
          <div class="row g-2 mb-2 attach-row">
            <div class="col-md-4">
              <select name="attach_categories" class="form-select">
                <option>客戶詢價信</option>
                <option>規格書</option>
                <option>圖面</option>
                <option>其它</option>
              </select>
            </div>
            <div class="col-md-7">
              <input type="file" name="attach_files" class="form-control">
            </div>
            <div class="col-md-1 d-flex align-items-center">
              <button type="button" class="btn btn-sm btn-outline-danger remove-row">
                <i class="bi bi-x"></i>
              </button>
            </div>
          </div>
        </div>
        <button type="button" id="add-attach" class="btn btn-sm btn-outline-primary">
          <i class="bi bi-plus"></i>增加一筆附件
        </button>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <a href="/npi-forms/" class="btn btn-outline-secondary">取消</a>
      <button class="btn btn-primary">儲存草稿</button>
    </div>
  </form>
</div>

<script>
document.getElementById("add-attach").addEventListener("click", () => {
  const first = document.querySelector(".attach-row");
  const clone = first.cloneNode(true);
  clone.querySelector("input[type=file]").value = "";
  document.getElementById("attach-rows").appendChild(clone);
});
document.addEventListener("click", (e) => {
  if (e.target.closest(".remove-row")) {
    const rows = document.querySelectorAll(".attach-row");
    if (rows.length > 1) e.target.closest(".attach-row").remove();
  }
});
</script>
{% endblock %}
